services:
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    restart: unless-stopped
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      INTERNAL_API_BASE_URL: http://api:3001
      NEXT_PUBLIC_API_BASE_URL: ""
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    environment:
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://erptry:erptry@postgres:5432/erptry
      SESSION_SECRET: ${SESSION_SECRET:-erptry-prod-session-secret}
      SESSION_TTL_MS: 28800000
      SEED_TENANT_SLUG: erptry
      SEED_TENANT_NAME: ERPTRY Demo
      SEED_ADMIN_EMAIL: owner@erptry.local
      SEED_ADMIN_PASSWORD: erptry1234
      SEED_MANAGER_PASSWORD: erptry1234
      SEED_OPERATOR_PASSWORD: erptry1234
      SEED_VIEWER_PASSWORD: erptry1234
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: erptry
      POSTGRES_USER: erptry
      POSTGRES_PASSWORD: erptry
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erptry -d erptry"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - erptry_postgres_data:/var/lib/postgresql/data

volumes:
  erptry_postgres_data:
